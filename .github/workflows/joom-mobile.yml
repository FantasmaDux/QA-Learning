name: Mobile tests

on:
  push:
    branches: [ main ]
    paths:
      - 'QA-Learning/joom-mobile/java-framework/mobile-test-joom/**'
  workflow_dispatch:                  

jobs:
  android-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./QA-Learning/joom-mobile/java-framework/mobile-test-joom
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create emulator and run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          script: ./gradlew test