name: Joom Mobile Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'joom-mobile/**'
  workflow_dispatch:

jobs:
  android-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x joom-mobile/java-framework/mobile-test-joom/gradlew

      - name: Run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -no-audio -no-boot-anim -verbose
          force-avd-creation: true
          script: |
            echo "========================================="
            echo "Waiting for emulator to fully boot..."
            echo "This may take 3-5 minutes"
            echo "========================================="
            
            # Ждём появления устройства
            timeout 300 adb wait-for-device || echo "Device not found after 300 seconds"
            
            # Ждём завершения загрузки
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 5; done;'
            
            echo "========================================="
            echo "Emulator boot completed!"
            echo "========================================="
            
            # Дополнительная задержка
            sleep 15
            
            # Установка Node.js и Appium
            echo "Installing Node.js..."
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
            
            echo "Installing Appium..."
            npm install -g appium@next
            appium driver install uiautomator2
            
            echo "Starting Appium..."
            appium --log /tmp/appium.log &
            sleep 20
            
            echo "Running tests..."
            cd joom-mobile/java-framework/mobile-test-joom
            ./gradlew test