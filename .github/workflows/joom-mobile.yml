name: Joom Mobile Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'joom-mobile/**'
  workflow_dispatch:

jobs:
  setup-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x joom-mobile/java-framework/mobile-test-joom/gradlew

      - name: Run tests with emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-build: 30.0.5
          script: |
            # Установка Node.js и Appium
            export DEBIAN_FRONTEND=noninteractive
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
            
            npm install -g appium@next
            appium driver install uiautomator2
            
            # Запуск Appium
            appium &
            APPIUM_PID=$!
            sleep 15
            
            # Запуск тестов
            cd joom-mobile/java-framework/mobile-test-joom
            ./gradlew test
            
            # Остановка Appium
            kill $APPIUM_PID