name: Joom Mobile Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'joom-mobile/**'
  workflow_dispatch:

jobs:
  android-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js (for Appium)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Appium
        run: |
          npm install -g appium@next
          appium driver install uiautomator2

      - name: Start Appium server
        run: |
          appium &
          sleep 10

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x joom-mobile/java-framework/mobile-test-joom/gradlew

      - name: Run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          script: cd joom-mobile/java-framework/mobile-test-joom && ./gradlew test