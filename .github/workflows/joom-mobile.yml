name: Joom Mobile Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'joom-mobile/**'
  workflow_dispatch:

jobs:
  android-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x joom-mobile/java-framework/mobile-test-joom/gradlew

      - name: Set up Node.js (for Appium)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run tests with emulator and Appium
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -no-audio
          script: |
            echo "Emulator is ready!"
            
            # Устанавливаем Appium (уже есть Node.js)
            npm install -g appium@next
            appium driver install uiautomator2
            
            # Запускаем Appium в фоне
            appium &
            
            # Ждём Appium
            sleep 15
            
            # Запускаем тесты
            cd joom-mobile/java-framework/mobile-test-joom
            ./gradlew test